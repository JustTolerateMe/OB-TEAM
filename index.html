<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owned Brand | Built With Purpose</title>
    <style>
        :root {
            --red: #ff3333;
            --white: #ffffff;
            --bg: #0a0a0a;
        }

        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-color: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--white);
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* Section Layout */
        section {
            height: 150vh;
            width: 100vw;
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            scroll-snap-align: start;
        }

        .scroll-container {
            height: 100vh;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            /* Firefox */
        }

        .scroll-container::-webkit-scrollbar {
            display: none;
            /* Chrome/Safari */
        }

        /* Branding Text Styling */
        #text-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            text-align: center;
            opacity: 0;
            z-index: 10;
            pointer-events: none;
            transition: opacity 0.8s ease-out, transform 1s cubic-bezier(0.16, 1, 0.3, 1);
            width: 90%;
            max-width: 900px;
        }

        .main-title {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 0.5rem;
            display: block;
            text-transform: uppercase;
            color: var(--red);
            text-shadow: 0 0 40px rgba(255, 0, 0, 0.4);
        }

        .sub-title {
            font-size: clamp(1.2rem, 4vw, 2.5rem);
            font-weight: 300;
            letter-spacing: 4px;
            display: block;
            opacity: 0.9;
        }

        .tag-line {
            font-size: clamp(0.9rem, 2vw, 1.5rem);
            font-weight: 400;
            letter-spacing: 2px;
            margin-top: 1.5rem;
            display: block;
            color: #ffffff;
            opacity: 0.6;
        }

        /* Side Navigation Dots */
        #side-nav {
            position: fixed;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: flex-end;
        }

        .nav-dot-container {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .nav-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0;
            transition: 0.3s ease;
            color: var(--white);
            pointer-events: none;
        }

        .nav-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-dot-container.active .nav-dot {
            background: var(--red);
            transform: scale(1.5);
            box-shadow: 0 0 15px var(--red);
        }

        .nav-dot-container.active .nav-label {
            opacity: 1;
        }

        .nav-dot-container:hover .nav-dot {
            background: rgba(255, 255, 255, 0.5);
        }

        /* Team Cards (Section 4) */
        #team-overlay {
            position: fixed;
            top: 0;
            left: 5%;
            /* Side margin */
            width: 300px;
            /* Constrain width */
            height: 100vh;
            pointer-events: none;
            z-index: 100;
            display: flex;
            flex-direction: column;
            /* Vertical stack */
            justify-content: center;
            /* Center-stack vertically */
            align-items: flex-start;
            /* Align cards to left */
            gap: 15px;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .team-card {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 20px;
            width: 210px;
            display: flex;
            /* Horizontal internal layout */
            align-items: center;
            gap: 15px;
            text-align: left;
            border-left: 4px solid var(--red);
            /* Side bar accent */
            border-bottom: none;
            transform: translateX(-30px);
            /* Entrance from left */
            transition: transform 1s cubic-bezier(0.16, 1, 0.3, 1), opacity 1s ease;
            opacity: 0;
        }

        #team-overlay.active .team-card {
            pointer-events: all;
            transform: translateX(0);
            opacity: 1;
        }

        #team-overlay.active {
            opacity: 1;
        }

        .member-avatar {
            width: 50px;
            /* Smaller */
            height: 50px;
            flex-shrink: 0;
            background: linear-gradient(45deg, var(--red), #550000);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 900;
            color: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .member-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .member-name {
            font-size: 1rem;
            font-weight: 800;
            margin-bottom: 2px;
            display: block;
        }

        .member-role {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--red);
            font-weight: 600;
        }

        /* Department Labels (Section 3) */
        .dept-label {
            position: fixed;
            z-index: 50;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 0;
            transition: opacity 0.5s ease;
            transform: translate(-50%, -50%);
        }

        .dept-card {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 18px;
            border-left: 3px solid var(--red);
            color: var(--white);
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            white-space: nowrap;
        }

        .dept-point {
            width: 8px;
            height: 8px;
            background: var(--red);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--red);
            position: relative;
        }

        .dept-line {
            height: 1px;
            width: 10px;
            /* Balanced extension */
            background: linear-gradient(to right, var(--red), transparent);
        }

        /* Mini-Sphere UI (Section 4 Corner) */
        #mini-sphere-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 150px;
            /* Smaller */
            height: 150px;
            z-index: 150;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .mini-label {
            position: absolute;
            z-index: 160;
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 4px 8px;
            color: var(--white);
            font-size: 0.7rem;
            font-weight: 800;
            border-left: 2px solid var(--red);
            transform: translate(-50%, -50%);
            white-space: nowrap;
        }
    </style>
    <!-- Import Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>

    <div id="side-nav">
        <div class="nav-dot-container active" onclick="scrollToSection(0)">
            <span class="nav-label">Intro</span>
            <div class="nav-dot"></div>
        </div>
        <div class="nav-dot-container" onclick="scrollToSection(1)">
            <span class="nav-label">Design</span>
            <div class="nav-dot"></div>
        </div>
        <div class="nav-dot-container" onclick="scrollToSection(2)">
            <span class="nav-label">Impact</span>
            <div class="nav-dot"></div>
        </div>
        <div class="nav-dot-container" onclick="scrollToSection(3)">
            <span class="nav-label">PD</span>
            <div class="nav-dot"></div>
        </div>
        <div class="nav-dot-container" onclick="scrollToSection(4)">
            <span class="nav-label">Material</span>
            <div class="nav-dot"></div>
        </div>
        <div class="nav-dot-container" onclick="scrollToSection(5)">
            <span class="nav-label">H&H</span>
            <div class="nav-dot"></div>
        </div>
        <div class="nav-dot-container" onclick="scrollToSection(6)">
            <span class="nav-label">A&A</span>
            <div class="nav-dot"></div>
        </div>
        <div class="nav-dot-container" onclick="scrollToSection(7)">
            <span class="nav-label">SEM</span>
            <div class="nav-dot"></div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <div id="text-box">
        <span class="main-title">Owned Brand</span>
        <span class="sub-title">Built With Purpose</span>
        <span class="tag-line">From insight to shelf.</span>
    </div>

    <!-- Department Labels Overlay -->
    <div id="labels-overlay">
        <div class="dept-label" id="label-pd">
            <div class="dept-point"></div>
            <div class="dept-line"></div>
            <div class="dept-card">PD</div>
        </div>
        <div class="dept-label" id="label-material">
            <div class="dept-point"></div>
            <div class="dept-line"></div>
            <div class="dept-card">Material</div>
        </div>
        <div class="dept-label" id="label-hh">
            <div class="dept-point"></div>
            <div class="dept-line"></div>
            <div class="dept-card">H&H</div>
        </div>
        <div class="dept-label" id="label-aa">
            <div class="dept-point"></div>
            <div class="dept-line"></div>
            <div class="dept-card">A&A</div>
        </div>
        <div class="dept-label" id="label-sem">
            <div class="dept-point"></div>
            <div class="dept-line"></div>
            <div class="dept-card">SEM</div>
        </div>
    </div>

    <!-- Team Overlay -->
    <div id="team-overlay">
        <div class="team-card" style="transition-delay: 0.1s;">
            <div class="member-avatar">A</div>
            <div class="member-info">
                <span class="member-name">Anshuman</span>
                <span class="member-role">Market Researcher</span>
            </div>
        </div>
        <div class="team-card" style="transition-delay: 0.2s;">
            <div class="member-avatar">O</div>
            <div class="member-info">
                <span class="member-name">Omkar</span>
                <span class="member-role">Product Designer</span>
            </div>
        </div>
        <div class="team-card" style="transition-delay: 0.3s;">
            <div class="member-avatar">S</div>
            <div class="member-info">
                <span class="member-name">Spruha</span>
                <span class="member-role">Product Designer</span>
            </div>
        </div>
    </div>

    <!-- Mini-Sphere Overlay -->
    <div id="mini-sphere-container">
        <div id="mini-label-pd" class="mini-label">PD</div>
    </div>

    <div class="scroll-container" id="scroll-wrapper">
        <section id="section-0"></section>
        <section id="section-1"></section>
        <section id="section-2"></section>
        <section id="section-3"></section>
        <section id="section-4"></section>
        <section id="section-5"></section>
        <section id="section-6"></section>
        <section id="section-7"></section>
    </div>

    <script>
        // 1. Scene Setup
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0a0a0a, 0.002);

        // 2. Camera Setup
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.z = 250;

        // 3. Renderer Setup
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 4. Particle System Generation
        const particleCount = 8000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);

        const colorRed = new THREE.Color(0xff3333);
        const colorWhite = new THREE.Color(0xffffff);
        const colorDarkRed = new THREE.Color(0x220000);

        for (let i = 0; i < particleCount; i++) {
            const rand = Math.random();
            let r, baseColor;

            if (rand < 0.15) {
                r = 20 + Math.random() * 5;
                baseColor = colorRed;
            } else if (rand < 0.5) {
                r = 55 + Math.random() * 5;
                baseColor = colorWhite;
            } else {
                r = 95 + Math.random() * 5;
                baseColor = colorRed;
            }

            const theta = 2 * Math.PI * Math.random();
            const phi = Math.acos(2 * Math.random() - 1);

            const x = r * Math.sin(phi) * Math.cos(theta);
            const y = r * Math.sin(phi) * Math.sin(theta);
            const z = r * Math.cos(phi);

            positions[i * 3] = x;
            positions[i * 3 + 1] = y;
            positions[i * 3 + 2] = z;

            const nz = z / 100;
            const depthFactor = (nz + 1) / 2;
            const finalColor = baseColor.clone().lerp(colorDarkRed, depthFactor * 0.6);

            colors[i * 3] = finalColor.r;
            colors[i * 3 + 1] = finalColor.g;
            colors[i * 3 + 2] = finalColor.b;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const canvas = document.createElement('canvas');
        canvas.width = 32; canvas.height = 32;
        const context = canvas.getContext('2d');
        const gradient = context.createRadialGradient(16, 16, 0, 16, 16, 16);
        gradient.addColorStop(0, 'rgba(255,255,255,1)');
        gradient.addColorStop(0.2, 'rgba(255,255,255,0.8)');
        gradient.addColorStop(0.5, 'rgba(255,255,255,0.2)');
        gradient.addColorStop(1, 'rgba(0,0,0,0)');
        context.fillStyle = gradient;
        context.fillRect(0, 0, 32, 32);
        const particleTexture = new THREE.Texture(canvas);
        particleTexture.needsUpdate = true;

        const material = new THREE.PointsMaterial({
            size: 4,
            vertexColors: true,
            map: particleTexture,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // Department Label Anchors (Specific radius r=50)
        const deps = [
            { id: 'label-pd', pos: new THREE.Vector3(50, 0, 0) },
            { id: 'label-material', pos: new THREE.Vector3(-35, 35, 0) },
            { id: 'label-hh', pos: new THREE.Vector3(0, -50, 0) },
            { id: 'label-aa', pos: new THREE.Vector3(-35, -35, 10) },
            { id: 'label-sem', pos: new THREE.Vector3(35, -35, -10) }
        ];

        deps.forEach(d => {
            d.element = document.getElementById(d.id);
        });

        // Interactivity
        let mouseX = 0, mouseY = 0;
        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX - window.innerWidth / 2) * 0.0005;
            mouseY = (e.clientY - window.innerHeight / 2) * 0.0005;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Scroll Logic
        const scrollWrapper = document.getElementById('scroll-wrapper');
        const navDots = document.querySelectorAll('.nav-dot-container');
        const textBox = document.getElementById('text-box');

        let targetScrollY = 0, currentScrollY = 0;
        scrollWrapper.addEventListener('scroll', () => {
            targetScrollY = scrollWrapper.scrollTop;
        });

        function scrollToSection(index) {
            scrollWrapper.scrollTo({
                top: index * window.innerHeight * 1.5, // Account for 150vh sections
                behavior: 'smooth'
            });
        }

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            // Smooth scroll tracking
            currentScrollY += (targetScrollY - currentScrollY) * 0.05;
            const maxScroll = scrollWrapper.scrollHeight - window.innerHeight;
            const scrollPercent = currentScrollY / maxScroll;

            // 8-Phase Animation Mapping (12.5% each)
            // 0: Intro (0.00 - 0.125)
            // 1: Branding Hold (0.125 - 0.250)
            // 2: Impact Labels (0.250 - 0.375)
            // 3: PD Detail (0.375 - 0.500)
            // 4: Material Detail (0.500 - 0.625)
            // 5: H&H Detail (0.625 - 0.750)
            // 6: A&A Detail (0.750 - 0.875)
            // 7: SEM Detail (0.875 - 1.00)

            let currentZ, currentScale, activeRotation;
            const cameraTarget = new THREE.Vector3(0, 0, 0);
            const phase = 0.125;

            if (scrollPercent <= phase) {
                const t = scrollPercent / phase;
                currentZ = 250 - Math.pow(t, 2) * 240; // 250 -> 10
                currentScale = 1 + Math.pow(t, 2) * 3.5;
                activeRotation = 0.001 + t * 0.04;
            } else if (scrollPercent <= phase * 2) {
                currentZ = 10;
                currentScale = 4.5;
                activeRotation = 0.041;
            } else if (scrollPercent <= phase * 3) {
                const t = (scrollPercent - phase * 2) / phase;
                const tZoom = Math.min(1, t / 0.4);
                currentZ = 10 + tZoom * 110; // 10 -> 120
                currentScale = 4.5 - tZoom * 1.8;
                activeRotation = 0.041;
            } else {
                // Determine which department we are zooming into (Phases 3 to 7)
                const deptIndex = Math.floor((scrollPercent - phase * 3) / phase);
                const clampedDeptIndex = Math.min(4, Math.max(0, deptIndex));
                const tDept = ((scrollPercent - phase * 3) % phase) / phase;

                const easedT = 1 - Math.pow(1 - tDept, 3); // Cubic Out 

                // Pull back slightly between transitions if tDept is low or high
                // For simplicity, we just zoom into the current active dept node
                currentZ = 120 - easedT * 115; // 120 -> 5
                currentScale = 2.7 - easedT * 0.4;
                activeRotation = 0.041 * (1 - easedT * 0.9);

                const targetNode = deps[clampedDeptIndex];
                const nodePos = targetNode.pos.clone().applyEuler(particleSystem.rotation);
                cameraTarget.lerp(nodePos, easedT * 0.98);

                // Update Mini-Sphere and Team Overlay based on clampedDeptIndex
                updateOverlayContent(clampedDeptIndex);
            }

            camera.position.z = currentZ;
            particleSystem.scale.set(currentScale, currentScale, currentScale);
            camera.lookAt(cameraTarget);

            // 5. Background Fade Logic (Hide particles in Section 4+)
            const canvasContainer = document.getElementById('canvas-container');
            const miniContainer = document.getElementById('mini-sphere-container');
            const impactStart = phase * 3; // Section 3 (PD) starts here

            if (scrollPercent > impactStart) {
                const tFade = (scrollPercent - impactStart) / (phase * 0.6);
                canvasContainer.style.opacity = Math.max(0, 1 - tFade);
                miniContainer.style.opacity = 1;
            } else if (scrollPercent > phase * 2.5) { // Fade out during Impact to Zoom transition
                canvasContainer.style.opacity = 1;
                miniContainer.style.opacity = 0;
            } else {
                canvasContainer.style.opacity = 1;
                miniContainer.style.opacity = 0;
            }

            // Update Mini-Sphere
            updateMiniSphere(Math.floor((scrollPercent - phase * 3) / phase));

            // Branding Text Logic
            if (scrollPercent > phase * 0.8 && scrollPercent < phase * 2.2) {
                textBox.style.opacity = 1;
                textBox.style.transform = "translate(-50%, -50%) scale(1)";
            } else {
                textBox.style.opacity = 0;
                textBox.style.transform = "translate(-50%, -50%) scale(0.8)";
            }

            // Team Overlay Logic
            const teamOverlay = document.getElementById('team-overlay');
            if (scrollPercent > phase * 3.2) {
                teamOverlay.classList.add('active');
            } else {
                teamOverlay.classList.remove('active');
                lastDeptIndex = -1; // Reset to allow re-triggering
            }

            // Side Nav Update
            const activeIndex = Math.min(7, Math.floor(scrollPercent * 7.99));
            navDots.forEach((dot, idx) => {
                if (idx === activeIndex) dot.classList.add('active');
                else dot.classList.remove('active');
            });

            // Department Labels Projection
            const showLabels = scrollPercent > phase * 2 && scrollPercent < phase * 3.5;
            deps.forEach((d, idx) => {
                if (showLabels) {
                    const vec = d.pos.clone().applyEuler(particleSystem.rotation);
                    vec.project(camera);
                    const x = (vec.x * 0.5 + 0.5) * window.innerWidth;
                    const y = (-vec.y * 0.5 + 0.5) * window.innerHeight;

                    d.element.style.left = `${x}px`;
                    d.element.style.top = `${y}px`;

                    // Zoom scaling for the PRIMARY active label
                    const activeZoomPhase = 3 + idx;
                    const phaseStart = activeZoomPhase * phase;
                    const phaseEnd = (activeZoomPhase + 1) * phase;

                    if (scrollPercent >= phaseStart && scrollPercent < phaseEnd) {
                        const tZoom = (scrollPercent - phaseStart) / phase;
                        const labelScale = 1 + tZoom * 15;
                        const labelOpacity = Math.max(0, 1 - (tZoom / 0.6));
                        d.element.style.transform = `translate(-50%, -50%) scale(${labelScale})`;
                        d.element.style.opacity = labelOpacity;
                    } else {
                        d.element.style.opacity = 1;
                        d.element.style.transform = "translate(-50%, -50%) scale(1)";
                    }
                    d.element.style.zIndex = vec.z < 0 ? 60 : 40;
                } else {
                    d.element.style.opacity = 0;
                }
            });

            // Rotation
            particleSystem.rotation.y += activeRotation;
            particleSystem.rotation.z -= activeRotation * 0.5;

            // Mouse Ease
            particleSystem.rotation.y += 0.05 * (mouseX - particleSystem.rotation.y);
            particleSystem.rotation.x += 0.05 * (mouseY - particleSystem.rotation.x);

            renderer.render(scene, camera);
        }

        // --- Dynamic Content Logic ---
        const teamData = [
            {
                dept: "PD",
                members: [
                    { name: "Anshuman", role: "Market Researcher", initial: "A" },
                    { name: "Omkar", role: "Product Designer", initial: "O" },
                    { name: "Spruha", role: "Product Designer", initial: "S" }
                ]
            },
            {
                dept: "Material",
                members: [
                    { name: "Michael", role: "Material Specialist", initial: "M" },
                    { name: "Elena", role: "Sustainability Lead", initial: "E" },
                    { name: "David", role: "Process Engineer", initial: "D" }
                ]
            },
            {
                dept: "H&H",
                members: [
                    { name: "Sarah", role: "UX Researcher", initial: "S" },
                    { name: "James", role: "Industrial Designer", initial: "J" },
                    { name: "Lisa", role: "Product Manager", initial: "L" }
                ]
            },
            {
                dept: "A&A",
                members: [
                    { name: "Alex", role: "Visual Designer", initial: "A" },
                    { name: "Ryan", role: "Creative Director", initial: "R" },
                    { name: "Chloe", role: "Content Strategist", initial: "C" }
                ]
            },
            {
                dept: "SEM",
                members: [
                    { name: "Tom", role: "Marketing Analyst", initial: "T" },
                    { name: "Jessica", role: "SEO Specialist", initial: "J" },
                    { name: "Kevin", role: "Growth Lead", initial: "K" }
                ]
            }
        ];

        let lastDeptIndex = -1;
        function updateOverlayContent(index) {
            const clampedIndex = Math.min(4, Math.max(0, index));
            if (clampedIndex === lastDeptIndex) return;
            lastDeptIndex = clampedIndex;

            const data = teamData[clampedIndex];
            const overlay = document.getElementById('team-overlay');
            overlay.innerHTML = ''; // Clear

            data.members.forEach((m, i) => {
                const card = document.createElement('div');
                card.className = 'team-card';
                card.style.transitionDelay = `${0.1 + i * 0.1}s`;
                card.innerHTML = `
                    <div class="member-avatar">${m.initial}</div>
                    <div class="member-info">
                        <span class="member-name">${m.name}</span>
                        <span class="member-role">${m.role}</span>
                    </div>
                `;
                overlay.appendChild(card);
            });
        }

        // --- Mini-Sphere Logic ---
        const miniScene = new THREE.Scene();
        const miniCamera = new THREE.PerspectiveCamera(75, 1, 1, 500); // Aspect 1 for square container
        miniCamera.position.z = 150;

        const miniRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        miniRenderer.setSize(150, 150);
        miniRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('mini-sphere-container').appendChild(miniRenderer.domElement);

        const miniParticleCount = 3000;
        const miniGeom = new THREE.BufferGeometry();
        const miniPos = new Float32Array(miniParticleCount * 3);
        const miniCols = new Float32Array(miniParticleCount * 3);

        for (let i = 0; i < miniParticleCount; i++) {
            const rand = Math.random();
            let r, baseColor;

            // Tightened Bullseye Pattern for smaller scale
            if (rand < 0.25) {
                r = 15 + Math.random() * 5; // Tighter core
                baseColor = colorRed;
            } else if (rand < 0.38) {
                r = 45 + Math.random() * 5; // Tighter middle
                baseColor = colorWhite;
            } else {
                r = 85 + Math.random() * 5; // Tighter outer
                baseColor = colorRed;
            }

            const theta = 2 * Math.PI * Math.random();
            const phi = Math.acos(2 * Math.random() - 1);
            const x = r * Math.sin(phi) * Math.cos(theta);
            const y = r * Math.sin(phi) * Math.sin(theta);
            const z = r * Math.cos(phi);

            miniPos[i * 3] = x;
            miniPos[i * 3 + 1] = y;
            miniPos[i * 3 + 2] = z;

            miniCols[i * 3] = baseColor.r;
            miniCols[i * 3 + 1] = baseColor.g;
            miniCols[i * 3 + 2] = baseColor.b;
        }

        miniGeom.setAttribute('position', new THREE.BufferAttribute(miniPos, 3));
        miniGeom.setAttribute('color', new THREE.BufferAttribute(miniCols, 3));
        const miniMat = new THREE.PointsMaterial({ size: 2.2, vertexColors: true, transparent: true, opacity: 0.95 }); // Larger/Solid particles
        const miniSystem = new THREE.Points(miniGeom, miniMat);
        miniScene.add(miniSystem);

        const miniPDNode = { pos: new THREE.Vector3(0, 0, 85), element: document.getElementById('mini-label-pd') };

        function updateMiniSphere(index) {
            const clampedIndex = Math.min(4, Math.max(0, index));
            miniPDNode.element.innerText = teamData[clampedIndex].dept;

            miniSystem.rotation.y += 0.008; // Slightly faster
            miniSystem.rotation.x += 0.003;

            // Project PD Label on mini-sphere
            const vec = miniPDNode.pos.clone().applyEuler(miniSystem.rotation);
            vec.project(miniCamera);
            const x = (vec.x * 0.5 + 0.5) * 150;
            const y = (-vec.y * 0.5 + 0.5) * 150;
            miniPDNode.element.style.left = `${x}px`;
            miniPDNode.element.style.top = `${y}px`;
            miniPDNode.element.style.opacity = vec.z < 1 ? 1 : 0; // Only show if on front side

            miniRenderer.render(miniScene, miniCamera);
        }

        animate();
    </script>
</body>

</html>
